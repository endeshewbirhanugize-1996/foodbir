<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.menu,
.cart{
    background:white;
    padding:20px;
    border-radius:10px;
    width:450px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

.food-card{
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

.food-card h3{
    margin-bottom:10px;
}

.food-card p{
    margin-bottom:10px;
    color:#555;
}

.food-card button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.food-card button:hover{
    background:#218838;
}

.cart ul{
    list-style:none;
    margin-top:10px;
}

.cart li{
    background:#eee;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:4px;
    cursor:pointer;
    margin-left:10px;
}

.order-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:15px;
}

.order-btn:hover{
    background:#0056b3;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:15px;
    background:#222;
    color:white;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>🍔 Online Food Delivery System</h1>
    <p>Order Your Favorite Food Online</p>
</header>

<div class="container">

    <!-- Menu Section -->
    <div class="menu">
        <h2>Food Menu</h2>

        <div class="food-card">
            <h3>Burger</h3>
            <p>Price: $8</p>
            <button onclick="addToCart('Burger',8)">Add To Cart</button>
        </div>

        <div class="food-card">
            <h3>Pizza</h3>
            <p>Price: $12</p>
            <button onclick="addToCart('Pizza',12)">Add To Cart</button>
        </div>

        <div class="food-card">
            <h3>Chicken Fry</h3>
            <p>Price: $15</p>
            <button onclick="addToCart('Chicken Fry',15)">Add To Cart</button>
        </div>

        <div class="food-card">
            <h3>Pasta</h3>
            <p>Price: $10</p>
            <button onclick="addToCart('Pasta',10)">Add To Cart</button>
        </div>

        <div class="food-card">
            <h3>Sandwich</h3>
            <p>Price: $6</p>
            <button onclick="addToCart('Sandwich',6)">Add To Cart</button>
        </div>

        <div class="food-card">
            <h3>Soft Drink</h3>
            <p>Price: $3</p>
            <button onclick="addToCart('Soft Drink',3)">Add To Cart</button>
        </div>
    </div>

    <!-- Cart Section -->
    <div class="cart">
        <h2>Shopping Cart</h2>

        <ul id="cartItems"></ul>

        <div class="total">
            Total: $<span id="total">0</span>
        </div>

        <button class="order-btn" onclick="placeOrder()">
            Place Order
        </button>
    </div>

</div>

<footer>
    <p>© 2026 Food Delivery System</p>
</footer>

<script>

let cart = [];

function addToCart(name, price){

    let existingItem = cart.find(
        item => item.name === name
    );

    if(existingItem){
        existingItem.quantity++;
    }else{
        cart.push({
            name:name,
            price:price,
            quantity:1
        });
    }

    updateCart();
}

function removeItem(name){

    cart = cart.filter(
        item => item.name !== name
    );

    updateCart();
}

function updateCart(){

    let cartItems =
        document.getElementById("cartItems");

    let total =
        document.getElementById("total");

    cartItems.innerHTML = "";

    let totalPrice = 0;

    cart.forEach(item => {

        totalPrice +=
            item.price * item.quantity;

        let li =
            document.createElement("li");

        li.innerHTML =
        `${item.name}
         (Qty: ${item.quantity})
         - $${item.price * item.quantity}
         <button class="remove-btn"
         onclick="removeItem('${item.name}')">
         Remove
         </button>`;

        cartItems.appendChild(li);
    });

    total.textContent = totalPrice;
}

function placeOrder(){

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let total =
        document.getElementById("total").innerText;

    alert(
        "Order Placed Successfully!\n\nTotal Amount: $" + total
    );

    cart = [];

    updateCart();
}

</script>

</body>
</html>
